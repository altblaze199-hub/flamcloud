<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>FlameClouds | Elite Hosting</title>
</head>
<body>

<section class="pricing-section">
    <div class="header-text">
        <h1>FlameClouds Hosting</h1>
        <p>High Performance, Low Latency, Instant Setup.</p>
    </div>

    <div class="pricing-container">
        <!-- Starter Plan -->
        <div class="plan-card">
            <h3>Starter</h3>
            <div class="price">₹20<span>/mo</span></div>
            <ul>
                <li>1 GB RAM</li>
                <li>1 vCPU</li>
                <li>10 GB SSD</li>
                <li>Basic Support</li>
            </ul>
            <button class="btn-main">Choose Plan</button>
        </div>

        <!-- Pro Plan (The Highlighted One) -->
        <div class="plan-card featured">
            <span class="badge">POPULAR</span>
            <h3>Pro</h3>
            <div class="price">₹99<span>/mo</span></div>
            <ul>
                <li>4 GB RAM</li>
                <li>2 vCPU</li>
                <li>30 GB SSD</li>
                <li>Minecraft / Bots</li>
            </ul>
            <button class="btn-main">Choose Plan</button>
        </div>

        <!-- Beast Plan -->
        <div class="plan-card">
            <h3>Beast</h3>
            <div class="price">₹399<span>/mo</span></div>
            <ul>
                <li>16 GB RAM</li>
                <li>6 vCPU</li>
                <li>100 GB SSD</li>
                <li>Hosting Panel</li>
            </ul>
            <button class="btn-main">Choose Plan</button>
        </div>
    </div>
</section>

</body>
</html>
